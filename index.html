<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Seller To 錯倉刷箱系統</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      margin: 0;
      padding: 15px;
      background-color: #f5f5f7;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h2 { color: #333; margin-top: 0; }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #4a5568;
    }
    .form-group select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      background-color: #fff;
    }

    #qr-reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      background: #2d3748;
      min-height: 250px;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      color: white;
      border: none;
      padding: 15px 0;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-start { background-color: #48bb78; box-shadow: 0 4px 6px rgba(72, 187, 120, 0.3); }
    .btn-stop { background-color: #e53e3e; }
    .btn-clear { background-color: #4a5568; }

    .dashboard {
      display: flex;
      justify-content: space-between;
      margin: 15px 0;
      background: #edf2f7;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }
    .dash-item { flex: 1; text-align: center; font-weight: bold; }

    #status {
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      background-color: #e2e8f0;
      color: #4a5568;
      margin-bottom: 15px;
    }
    
    #log {
      width: 100%;
      height: 120px;
      background: #1a202c;
      color: #cbd5e0;
      font-family: monospace;
      font-size: 12px;
      padding: 8px;
      box-sizing: border-box;
      border-radius: 6px;
      text-align: left;
      white-space: pre-wrap;
      overflow-y: auto;
    }

    #scanTable {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }
    #scanTable th, #scanTable td {
      border: 1px solid #e2e8f0;
      padding: 8px;
      text-align: center;
    }
    #scanTable th { background-color: #edf2f7; }
  </style>
</head>
<body>

<div class="container">
  <h2>📦 Seller To 錯倉刷箱系統</h2>
  
  <div class="form-group">
    <label for="warehouse-select">📍 目前刷箱倉庫：</label>
    <select id="warehouse-select">
      <option value="楊梅">楊梅</option>
      <option value="安南三">安南三</option>
    </select>
  </div>

  <button id="btnStartCamera" class="btn btn-start">📷 啟動即時鏡頭掃描</button>
  <button id="btnStop" class="btn btn-stop">🛑 停止相機</button>
  <button id="btnSync" class="btn btn-clear">🗑️ 清空本地紀錄</button>

  <div id="qr-reader"></div>
  
  <div id="status">狀態：等待啟動</div>

  <div class="dashboard">
    <div class="dash-item">總掃描: <span id="totalCount">0</span></div>
    <div class="dash-item" style="color: #2f855a;">已上傳: <span id="uploadedCount">0</span></div>
    <div class="dash-item" style="color: #c53030;">待上傳: <span id="pendingCount">0</span></div>
  </div>

  <textarea id="log" readonly placeholder="系統日誌紀錄..."></textarea>

  <table id="scanTable">
    <thead>
      <tr>
        <th>序號</th>
        <th>QR Code 內容</th>
        <th>時間</th>
        <th>狀態</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// DOM 元素
const btnStartCamera = document.getElementById('btnStartCamera');
const btnStop = document.getElementById('btnStop');
const btnSync = document.getElementById('btnSync');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const totalCountEl = document.getElementById('totalCount');
const scanTableBody = document.querySelector('#scanTable tbody');
const uploadedCountEl = document.getElementById('uploadedCount'); 
const pendingCountEl = document.getElementById('pendingCount');

// 配置常數（使用個人帳號 GAS URL）
const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbxnHOra_04o4VcYRQlKOCmWlvzLZ0eHlP1q0Yd6QWDcEIi0bvkv5Tsso5-ghzfobhlZ/exec"; 
const LOCAL_KEY = 'qr_scan_offline_buffer_v1_simple';
const BATCH_SIZE = 1; 
const BATCH_TIMEOUT_MS = 5000; 

let html5QrScanner = null;
let isScanning = false;
let audioContext = null;
let buffer = []; 
let sending = false;
let timerId = null;

// ====================================================================
// 核心處理邏輯
// ====================================================================

function updateScanList(){
    let uploadedCount = 0;
    totalCountEl.textContent = buffer.length;
    scanTableBody.innerHTML = ''; 
    
    for(let i = buffer.length - 1; i >= 0; i--){
        const item = buffer[i];
        const row = scanTableBody.insertRow();
        row.insertCell().textContent = i + 1; 
        row.insertCell().textContent = item.code; 
        row.insertCell().textContent = item.ts; 
        
        const statusCell = row.insertCell();
        if(item.sent){
            row.style.backgroundColor = '#d4edda'; 
            statusCell.textContent = '✅ 已上傳';
            uploadedCount++;
        } else {
            statusCell.textContent = '⏳ 待上傳';
        }
    }
    uploadedCountEl.textContent = uploadedCount;
    pendingCountEl.textContent = buffer.length - uploadedCount;
}
    
function loadLocalBuffer(){
    try{
        const raw = localStorage.getItem(LOCAL_KEY);
        if(raw){ 
            buffer = JSON.parse(raw); 
            appendLog(`從 localStorage 載入 ${buffer.length} 筆紀錄`); 
        }
    }catch(e){ console.error(e);} 
    updateScanList(); 
}
    
function saveLocalBuffer(){ localStorage.setItem(LOCAL_KEY, JSON.stringify(buffer)); }

function appendLog(text){
    let safeText = String(text);
    if (safeText.includes('<html') || safeText.length > 500) {
        safeText = safeText.substring(0, 500) + '... (資料過長已截斷)';
    }
    logEl.textContent = new Date().toLocaleTimeString('zh-TW') + ' - ' + safeText + '\n' + logEl.textContent;
}

function initAudioContext() {
    if (audioContext) return;
    try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextClass();
    } catch (e) { console.warn("無法初始化音效模組:", e); }
}

function playBeep() {
    initAudioContext();
    if (!audioContext) return;
    
    const duration = 0.1;
    const frequency = 880;
    const volume = 0.3;
    
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();

    oscillator.type = 'square';
    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
    gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    oscillator.start();
    oscillator.stop(audioContext.currentTime + duration);
}

function enqueue(code){
    playBeep();
    
    const isDuplicate = buffer.some(item => item.code === code); 
    if(isDuplicate){
        appendLog(`⚠️ 忽略重複條碼: ${code}`); 
        return; 
    }
    
    const warehouse = document.getElementById('warehouse-select').value;
    const now = new Date();
    const localTimeString = now.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });
    
    const item = {
        warehouse: warehouse, 
        code: code,
        ts: localTimeString,
        sent: false
    };
    
    buffer.push(item);
    saveLocalBuffer();
    appendLog(`🟢 成功讀取: ${code}`);
    updateScanList();
    
    sendBatch();
}

async function sendBatch(){
    if(sending) return;
    
    const indexedPending = buffer
        .map((item, index) => ({ item, index }))
        .filter(entry => !entry.item.sent);

    if(indexedPending.length === 0) return; 
    if(!navigator.onLine){ appendLog('📶 目前處於離線狀態，資料已安全儲存。'); return; }
    
    sending = true;
    const entry = indexedPending[0]; 
    
    try{
        // 🛠️ 關鍵修正：改用 URLSearchParams 封裝資料，這對 GAS 的 no-cors 穿透力是 100%
        const formData = new URLSearchParams();
        formData.append('warehouse', entry.item.warehouse);
        formData.append('qrContent', entry.item.code);

        await fetch(GAS_ENDPOINT, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, // 修改標頭
            body: formData.toString() // 改傳送網址參數字串
        });
        
        // 只要沒有噴網路斷線錯誤，就代表 Google 已收件
        buffer[entry.index].sent = true;
        saveLocalBuffer();
        appendLog(`✅ 成功上傳至雲端試算表: ${entry.item.code}`);
        updateScanList();

        const remaining = buffer.filter(item => !item.sent).length;
        if (remaining > 0) { setTimeout(sendBatch, 300); }
        
    }catch(err){
        appendLog(`🔴 上傳失敗。原因: ${err.message}`); 
    } finally {
        sending = false;
    }
}

function startBatchTimer(){
    stopBatchTimer();
    timerId = setInterval(()=>{ sendBatch(); }, BATCH_TIMEOUT_MS);
}

function stopBatchTimer(){ 
    if(timerId) clearInterval(timerId); 
    timerId = null; 
}

function clearLocalBuffer() {
    if (isScanning) {
        alert('🚫 請先點擊「停止相機」按鈕結束作業後，才能清空歷史紀錄。');
        return;
    }
    const pendingCount = buffer.filter(item => !item.sent).length;
    let msg = "確定要清空歷史紀錄嗎？";
    if (pendingCount > 0) { msg = `注意：您還有 ${pendingCount} 筆待上傳資料。確定要強行清空嗎？`; }
    
    if (!confirm(msg)) return;

    stopBatchTimer(); 
    buffer = [];
    localStorage.removeItem(LOCAL_KEY);
    updateScanList();
    appendLog('✅ 本地紀錄已完全清空。');
}

// ====================================================================
// 控制按鈕監聽（完全沿用你最穩定的啟動語法）
// ====================================================================

btnStartCamera.addEventListener('click', ()=>{
    initAudioContext();
    if(html5QrScanner) return; 
        
    html5QrScanner = new Html5Qrcode("qr-reader");
    html5QrScanner.start({ facingMode: 'environment' }, {
        fps: 10,
        qrbox: { width: 250, height: 250 }
    }, (decodedText, decodedResult)=>{
        statusEl.textContent = '最新掃描: ' + decodedText;
        enqueue(decodedText);
    }, (errorMessage) => {
        // 忽略日常雜訊
    }).then(()=>{
        appendLog('🚀 相機鏡頭啟動成功'); 
        statusEl.textContent = '掃描中...';
        isScanning = true; 
        btnSync.disabled = true; 
        startBatchTimer();
    }).catch(err=>{ 
        alert('無法啟動相機，請確認是否由 Safari/Chrome 開啟並允許權限: ' + err); 
    });
});

btnStop.addEventListener('click', ()=>{
    if(html5QrScanner){
        html5QrScanner.stop().then(()=>{
            html5QrScanner.clear(); 
            html5QrScanner = null; 
            appendLog('🛑 相機已安全關閉'); 
            statusEl.textContent = '已停止';
            isScanning = false;
            btnSync.disabled = false; 
        }).catch(e => console.error(e)); 
    }
    stopBatchTimer();
});

btnSync.addEventListener('click', ()=>{ clearLocalBuffer(); });

// 初始化
loadLocalBuffer();
window.addEventListener('online', ()=>{ 
    appendLog('📶 偵測到網路恢復，啟動自動補傳機制...'); 
    sendBatch(); 
});
</script>

</body>
</html>
