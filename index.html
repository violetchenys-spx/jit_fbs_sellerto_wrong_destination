<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 紙箱即時掃描系統</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      margin: 0;
      padding: 15px;
      background-color: #f5f5f7;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h2 { color: #333; margin-top: 0; }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #4a5568;
    }
    .form-group select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      background-color: #fff;
    }

    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      background: #2d3748;
      min-height: 250px;
      margin-bottom: 15px;
    }

    .btn-start {
      display: inline-block;
      width: 100%;
      background-color: #48bb78;
      color: white;
      border: none;
      padding: 18px 0;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(72, 187, 120, 0.3);
      margin-bottom: 15px;
    }
    .btn-start:active { background-color: #38a169; }

    #status {
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      background-color: #e2e8f0;
      color: #4a5568;
      word-break: break-all;
    }
    .success { background-color: #c6f6d5 !important; color: #22543d !important; }
    .loading { background-color: #feebc8 !important; color: #744210 !important; }
    .error { background-color: #fed7d7 !important; color: #742a2a !important; }
  </style>
</head>
<body>

<div class="container">
  <h2>📦 紙箱即時掃描系統 (GitHub強制版)</h2>
  
  <div class="form-group">
    <label for="warehouse-select">📍 目前刷箱倉庫：</label>
    <select id="warehouse-select">
      <option value="楊梅">楊梅</option>
      <option value="安南三">安南三</option>
    </select>
  </div>

  <button id="active-camera-btn" class="btn-start" onclick="startScanning()">📷 啟動即時鏡頭掃描</button>
  <div id="reader"></div>
  <div id="status">請先點擊上方綠色按鈕開啟相機</div>
</div>

<script>
  let isProcessing = false;
  let html5QrCode = null;

  // 使用你的個人帳號 GAS 網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxnHOra_04o4VcYRQlKOCmWlvzLZ0eHlP1q0Yd6QWDcEIi0bvkv5Tsso5-ghzfobhlZ/exec"; 

  function startScanning() {
    const statusDiv = document.getElementById('status');
    statusDiv.className = 'loading';
    statusDiv.innerText = '正在強力喚醒手機後鏡頭...';
    
    document.getElementById('active-camera-btn').style.display = 'none';

    // 關鍵改動：改用 Html5QrCode 核心，不帶任何內建 UI 的純淨模式
    html5QrCode = new Html5QrCode("reader");

    // 強制指定使用後置鏡頭（environment），並給予極寬容的對焦設定
    html5QrCode.start(
      { facingMode: "environment" }, 
      {
        fps: 25,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          var qrboxSize = Math.floor(Math.min(viewfinderWidth, viewfinderHeight) * 0.75);
          return { width: qrboxSize, height: qrboxSize };
        }
      },
      onScanSuccess,
      onScanFailure
    )
    .then(() => {
      statusDiv.className = 'success';
      statusDiv.innerText = '📷 鏡頭啟動成功！請對準 QR Code';
    })
    .catch(err => {
      document.getElementById('active-camera-btn').style.display = 'inline-block';
      statusDiv.className = 'error';
      statusDiv.innerText = '❌ 鏡頭啟動失敗。錯誤訊息：' + err;
    });
  }

  function onScanSuccess(decodedText, decodedResult) {
    if (isProcessing) return;
    isProcessing = true;
    
    const statusDiv = document.getElementById('status');
    const warehouse = document.getElementById('warehouse-select').value;
    
    statusDiv.className = 'loading';
    statusDiv.innerText = `[${warehouse}] 嗶！讀取成功，同步寫入中...`;

    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ warehouse: warehouse, qrContent: decodedText })
    })
    .then(() => {
      statusDiv.className = 'success';
      statusDiv.innerText = `【${warehouse}】成功寫入：${decodedText}`;
      
      setTimeout(() => {
        statusDiv.className = 'success';
        statusDiv.innerText = '請對準下一個紙箱 QR Code';
        isProcessing = false;
      }, 2000);
    })
    .catch(err => {
      statusDiv.className = 'error';
      statusDiv.innerText = '傳送錯誤：' + err;
      setTimeout(() => { isProcessing = false; }, 2000);
    });
  }

  function onScanFailure(error) {
    // 靜態忽略日常掃描雜訊
  }
</script>

</body>
</html>
